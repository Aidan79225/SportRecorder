name: Release to Play

# Builds the signed AAB and uploads it to Google Play.
#
# Trigger by pushing a version tag (e.g. `git push origin 0.6.0`) after you've bumped the
# version in app/build.gradle.kts and updated distribution/whatsnew/*. Or run manually from
# the Actions tab to pick the track / release status.
#
# Required repo secret:
#   PLAY_SERVICE_ACCOUNT_JSON — full JSON key of a Google Cloud service account that has been
#   granted access to this app in the Play Console (Users & permissions).
# Signing needs no secret: the release keystore + passwords live in the repo.

on:
  push:
    tags: ['[0-9]+.[0-9]+.[0-9]+']
  workflow_dispatch:
    inputs:
      track:
        description: Play track
        type: choice
        default: internal
        options: [internal, alpha, beta, production]
      status:
        description: Release status (use draft for production)
        type: choice
        default: completed
        options: [completed, draft]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install required SDK packages
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build signed AAB
        run: ./gradlew bundleRelease --stacktrace

      - name: Upload to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.crazystudio.sportrecorder
          releaseFiles: app/build/outputs/bundle/release/app-release.aab
          track: ${{ github.event.inputs.track || 'internal' }}
          status: ${{ github.event.inputs.status || 'completed' }}
          whatsNewDirectory: distribution/whatsnew
