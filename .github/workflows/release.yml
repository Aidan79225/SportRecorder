name: Release to Play

# Builds the signed AAB and uploads it to Google Play.
#
# Trigger by pushing a version tag (e.g. `git push origin 0.6.0`) after you've bumped the
# version in app/build.gradle.kts and updated distribution/whatsnew/*. Or run manually from
# the Actions tab to pick the track / release status.
#
# Required repo secrets:
#   PLAY_SERVICE_ACCOUNT_JSON  — full JSON key of a Google Cloud service account granted access
#                                to this app in the Play Console (Users & permissions).
#   UPLOAD_KEYSTORE_BASE64     — the upload keystore (.p12/.jks), base64-encoded
#                                (e.g. `base64 -w0 sportrecorder-upload.p12`).
#   UPLOAD_KEYSTORE_PASSWORD   — the keystore password.
#   UPLOAD_KEY_PASSWORD        — the key password (same as the keystore password for PKCS12).
# The keystore is no longer kept in the repo; it's decoded from the secret at build time.

on:
  push:
    tags: ['[0-9]+.[0-9]+.[0-9]+']
  workflow_dispatch:
    inputs:
      track:
        description: Play track
        type: choice
        default: internal
        options: [internal, alpha, beta, production]
      status:
        description: Release status (use draft for production)
        type: choice
        default: completed
        options: [completed, draft]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install required SDK packages
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Decode upload keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.UPLOAD_KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/upload.p12"

      - name: Build signed AAB
        env:
          UPLOAD_KEYSTORE_FILE: ${{ runner.temp }}/upload.p12
          UPLOAD_KEYSTORE_PASSWORD: ${{ secrets.UPLOAD_KEYSTORE_PASSWORD }}
          UPLOAD_KEY_ALIAS: upload
          UPLOAD_KEY_PASSWORD: ${{ secrets.UPLOAD_KEY_PASSWORD }}
        run: ./gradlew bundleRelease --stacktrace

      - name: Upload to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.crazystudio.sportrecorder
          releaseFiles: app/build/outputs/bundle/release/app-release.aab
          track: ${{ github.event.inputs.track || 'internal' }}
          status: ${{ github.event.inputs.status || 'completed' }}
          whatsNewDirectory: distribution/whatsnew
