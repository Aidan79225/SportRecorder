name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install required SDK packages
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build, unit tests, detekt, lint
        run: ./gradlew assembleDebug testDebugUnitTest :app:detekt :app:lintDebug :shared:jvmTest --stacktrace

      - name: Upload reports on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: reports
          path: |
            app/build/reports/
            app/build/test-results/
          if-no-files-found: ignore

  ios-shared:
    # iOS (Kotlin/Native) targets require macOS; verify the shared module compiles + tests on iOS.
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Compile + test shared on iOS simulator
        run: ./gradlew :shared:iosSimulatorArm64Test --stacktrace
